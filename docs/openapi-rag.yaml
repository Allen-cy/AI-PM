openapi: 3.1.0
info:
  title: AI-PMO RAG API
  version: 1.0.0
paths:
  /api/rag/query:
    post:
      summary: Query reviewed AI-PMO knowledge
      operationId: queryRag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagQuery'
      responses:
        '200':
          description: Answer, refusal, or permission result
          headers:
            X-Request-Id:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagResult'
        '400': { $ref: '#/components/responses/Problem' }
        '422': { $ref: '#/components/responses/Problem' }
  /api/rag/health:
    get:
      summary: Read RAG index health
      operationId: getRagHealth
      responses:
        '200':
          description: Current provider and corpus status
          content:
            application/json:
              schema:
                type: object
                required: [status, provider, index_version, page_count, retrieval_mode]
                properties:
                  status: { type: string, enum: [ok, degraded] }
                  provider: { type: string, const: local-corpus }
                  index_version: { type: string }
                  page_count: { type: integer }
                  retrieval_mode: { type: string, const: keyword }
  /api/integrations/feishu/health:
    get:
      summary: Verify server-side Feishu app identity and Base mapping
      operationId: getFeishuHealth
      responses:
        '200':
          description: Base and configured tables are accessible
        '503':
          description: Credentials are absent, Base is unavailable, or table mapping is degraded
components:
  schemas:
    RagQuery:
      type: object
      required: [query]
      properties:
        query: { type: string, minLength: 1, maxLength: 2000 }
        top_k: { type: integer, minimum: 1, maximum: 20, default: 5 }
        filters:
          type: object
          properties:
            domains: { type: array, items: { type: string } }
            confidentiality_max: { type: string, enum: [public, internal, confidential, restricted] }
            status: { type: array, items: { type: string, enum: [draft, reviewed, published, deprecated, archived] } }
    RagResult:
      type: object
      required: [answer, answer_status, confidence, citations, retrieval, trace_id, schema_version]
      properties:
        answer: { type: string }
        answer_status: { type: string, enum: [answered, insufficient_evidence, forbidden, error] }
        confidence: { type: number, minimum: 0, maximum: 1 }
        citations:
          type: array
          items:
            type: object
            required: [page_id, source_ids, document, excerpt, relevance]
            properties:
              page_id: { type: string, pattern: '^KB-[0-9]{4,}$' }
              source_ids: { type: array, items: { type: string, pattern: '^SRC-[0-9]{4,}$' } }
              document: { type: string }
              excerpt: { type: string }
              relevance: { type: number }
        retrieval:
          type: object
          required: [mode, provider, index_version, result_count]
          properties:
            mode: { type: string, const: keyword }
            provider: { type: string, const: local-corpus }
            index_version: { type: string }
            result_count: { type: integer }
        trace_id: { type: string }
        schema_version: { type: string, const: '1.0' }
  responses:
    Problem:
      description: RFC 9457 problem detail
      content:
        application/problem+json:
          schema:
            type: object
            required: [type, title, status, detail, request_id]
            properties:
              type: { type: string }
              title: { type: string }
              status: { type: integer }
              detail: { type: string }
              request_id: { type: string }
